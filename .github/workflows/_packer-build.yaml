---
name: Packer Build

on:
  workflow_call:
    inputs:
      repository:
        description: 'Repository containing Packer templates'
        type: string
        default: ''
      ref:
        description: 'Branch or ref to check out'
        type: string
        default: ''
      directories:
        description: 'Space-separated list of packer directories to build. Overrides changed-files detection when provided (e.g. for manual dispatch).'
        type: string
        default: ''
    secrets:
      VAULT_TOKEN:
        description: 'Vault token with permissions to access secrets needed for build'
        required: true
      GCP_STORAGE:
        description: 'Base64-encoded GCP service account key for Terraform template verification'
        required: true

jobs:
  build:
    outputs:
      TMPL_NAME: ${{ steps.set_TMPL_NAME.outputs.TMPL_NAME }}
    name: Build Packer Templates
    runs-on: arc-runners
    env:
      VAULT_ADDR: ${{ vars.VAULT_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.head_ref }}

      - name: Setup Packer
        uses: hashicorp/setup-packer@main
        with:
          version: "latest"

      - name: Get changed files
        id: changed-files
        if: inputs.directories == ''
        uses: tj-actions/changed-files@v46.0.5
        with:
          files: |
            **/*.pkr.hcl

      - name: Resolve directories to build
        id: dirs
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          if [[ -n "${{ inputs.directories }}" ]]; then
            # Manual dispatch: use provided directories directly
            dirs="${{ inputs.directories }}"
          else
            # Push event: derive unique dirs from changed .pkr.hcl files
            dirs=$(for file in $CHANGED_FILES; do dirname "$file"; done | sort -u | tr '\n' ' ')
          fi
          echo "dirs=$dirs" >> $GITHUB_OUTPUT

      - name: Run packer init
        env:
          DIRS: ${{ steps.dirs.outputs.dirs }}
        run: |
          for dir in $DIRS; do
            echo "Running packer init for $dir"
            packer init "$dir"
          done

      - name: Run packer build
        if: steps.dirs.outputs.dirs != ''
        env:
          DIRS: ${{ steps.dirs.outputs.dirs }}
        run: |
          # xorriso needed for vsphere-iso to build Windows template
          sudo apt-add-repository universe
          sudo apt-get install -y xorriso
          for dir in $DIRS; do
            echo "Building $dir"
            packer build "$dir"
          done

      - name: Set vars from artifact info
        env:
          DIRS: ${{ steps.dirs.outputs.dirs }}
        id: set_TMPL_NAME
        run: |
          for dir in $DIRS; do
            echo "Setting vars for $dir"
            echo "TMPL_NAME=$(jq -r '.builds[0].artifact_id' "$dir/build-manifest.json")" >> $GITHUB_OUTPUT
          done

  call_terraform_vsphere-tmpl-verify:
    needs: build
    uses: eingram-homelab/reusable_workflows/.github/workflows/_vsphere-verify-template.yaml@main
    with:
      TMPL_NAME: ${{ needs.build.outputs.TMPL_NAME }}
    secrets:
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
      GCP_STORAGE: ${{ secrets.GCP_STORAGE }}

  call_publish_template:
    needs:
      - call_terraform_vsphere-tmpl-verify
      - build
    uses: eingram-homelab/reusable_workflows/.github/workflows/_packer-publish-template.yaml@main
    with:
      TMPL_NAME: ${{ needs.build.outputs.TMPL_NAME }}
    secrets:
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
