---
name: Packer Validation

on:
  workflow_call:
    inputs:
      repository:
        description: 'Repository containing Packer templates'
        type: string
        default: ''
      ref:
        description: 'Branch or ref to check out'
        type: string
        default: ''
    secrets:
      VAULT_TOKEN:
        description: 'Vault token with permissions to access secrets needed for validation'
        required: true

jobs:
  validate:
    name: Validate Packer Templates
    runs-on: arc-runners
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ inputs.repository || github.repository }}
          ref: ${{ inputs.ref || github.head_ref }}

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v46.0.5
        with:
          files: |
            **/*.pkr.hcl

      - name: Setup Packer
        if: steps.changed-files.outputs.all_changed_files != ''
        uses: hashicorp/setup-packer@v3.2.0

      - name: Validate changed Packer templates
        if: steps.changed-files.outputs.all_changed_files != ''
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
          VAULT_ADDR: ${{ vars.VAULT_ADDR }}
          VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
        run: |
          dirs=$(for file in $CHANGED_FILES; do dirname "$file"; done | sort -u)
          for dir in $dirs; do
            echo "::notice::=== Processing $dir ==="
            echo "::notice::Running packer fmt -check for $dir"
            packer fmt -check "$dir"
            echo "::notice::Running packer init for $dir"
            packer init "$dir"
            echo "::notice::Running packer validate for $dir"
            packer validate "$dir"
            echo "::notice::Finished validating $dir"
          done
