---
name: SonarQube Scan

on:
  workflow_call:
    inputs:
      ref:
        description: 'Branch or ref to check out. Defaults to the current ref.'
        type: string
        default: ''
      project_base_dir:
        description: 'Project base directory passed to the Sonar scanner'
        type: string
        default: '.'
      sonar_properties_path:
        description: 'Path to the sonar-project.properties file relative to the repository root'
        type: string
        default: 'sonar-project.properties'
      scan_args:
        description: 'Additional arguments passed to the Sonar scanner'
        type: string
        default: ''
    secrets:
      sonar_token:
        description: 'SonarQube or SonarQube Cloud token used for authentication'
        required: true

jobs:
  scan:
    name: SonarQube Scan
    runs-on: arc-runners
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - name: test
        run: |
          echo "Running SonarQube scan on ref: ${{ inputs.ref || github.ref }}"

      - name: Install dirmngr binary
        run: sudo apt update && sudo apt install -y dirmngr

      - name: Set up Java
        uses: actions/setup-java@v5.0.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Run SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v8.1.0
        with:
          projectBaseDir: ${{ inputs.project_base_dir }}
          args: >-
            -Dproject.settings=${{ inputs.sonar_properties_path }}
            ${{ inputs.scan_args }}
        env:
          GITHUB_REF: ${{ inputs.ref || github.ref }}
          SONAR_TOKEN: ${{ secrets.sonar_token }}
