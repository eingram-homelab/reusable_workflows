---
name: Validate Workflow Files

on:
  workflow_call:
    inputs:
      paths:
        description: 'Space-separated list of paths to lint with yamllint'
        type: string
        default: '.github/workflows/'
      changed_files_patterns:
        description: 'Newline-separated glob patterns passed to tj-actions/changed-files'
        type: string
        default: |
          .github/workflows/**
      yamllint_config:
        description: 'Path to yamllint config file relative to the repository root'
        type: string
        default: ''

jobs:
  validate:
    name: Workflow Validation Checks
    runs-on: arc-runners
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install actionlint dependencies | nodejs npm pipx
        run: sudo apt update && sudo apt install -y nodejs npm pipx

      - name: Get changed workflow files
        id: changed
        uses: tj-actions/changed-files@v47.0.6
        with:
          files: ${{ inputs.changed_files_patterns }}

      - name: Create list of changed files for yaml-lint (space delimited)
        if: steps.changed.outputs.any_changed == 'true'
        id: list_changed_files_yamllint
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}
        run: |
          echo "Changed workflow files:"
          final_file_list=""
          for file in $CHANGED_FILES; do
            echo "  - $file"
            final_file_list+="$file "
          done
          echo "final_file_list_yamllint=$final_file_list" >> "$GITHUB_OUTPUT"

      - name: yaml-lint
        id: yamllint
        uses: eingram-homelab/reusable-workflows/.github/actions/yamllint@yamllint-v0.0.2
        if: steps.changed.outputs.any_changed == 'true'
        continue-on-error: true
        with:
          file_or_dir: ${{ steps.list_changed_files_yamllint.outputs.final_file_list_yamllint }}
          config_file: ${{ inputs.yamllint_config || '' }}

      - name: yaml-lint Summary
        if: ${{ always() && steps.changed.outputs.any_changed == 'true' && steps.yamllint.outcome != 'skipped' }}
        run: |
          {
            echo "## yaml-lint"
            echo

            if [[ "${{ steps.yamllint.outcome }}" == "success" ]]; then
              echo "No yaml-lint errors found."
            else
              echo "Found yaml-lint issues in changed workflow files."
              echo
              echo '```text'
              if [[ -n "${{ steps.yamllint.outputs.logfile }}" && -f "${{ steps.yamllint.outputs.logfile }}" ]]; then
                cat "${{ steps.yamllint.outputs.logfile }}"
              else
                echo "yamllint failed but no logfile was produced."
              fi
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [[ "${{ steps.yamllint.outcome }}" != "success" ]]; then
            exit 1
          fi

      - name: Create list of changed files for actionlint (comma delimited)
        if: steps.changed.outputs.any_changed == 'true'
        id: list_changed_files_actionlint
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}
        run: |
          echo "Changed workflow files:"
          final_file_list=""
          for file in $CHANGED_FILES; do
            echo "  - $file"
            final_file_list+="$file,"
          done
          final_file_list=${final_file_list%,}  # Remove trailing comma
          echo "final_file_list_actionlint=$final_file_list" >> "$GITHUB_OUTPUT"

      - name: Update path for pipx-installed modules
        run: echo "PATH=/home/runner/.local/bin:$PATH" >> "$GITHUB_ENV"

      - name: actionlint
        if: steps.changed.outputs.any_changed == 'true'
        id: actionlint  #optional, id required only when outputs are used in the workflow steps later
        uses: raven-actions/actionlint@v2.1.2
        with:
          matcher: false  # optional
          cache: false  # optional
          fail-on-error: false  # optional
          files: ${{ steps.list_changed_files_actionlint.outputs.final_file_list_actionlint }}
          flags: -config-file .actionlint.yaml

      - name: actionlint Summary
        if: ${{ steps.actionlint.outputs.exit-code != 0 }}  # example usage, do echo only when actionlint action failed
        run: |
          {
            echo "Used actionlint version ${{ steps.actionlint.outputs.version-semver }}"
            echo "Used actionlint release ${{ steps.actionlint.outputs.version-tag }}"
            echo "actionlint ended with ${{ steps.actionlint.outputs.exit-code }} exit code"
            echo "actionlint ended because '${{ steps.actionlint.outputs.exit-message }}'"
            echo "actionlint found ${{ steps.actionlint.outputs.total-errors }} errors"
            echo "actionlint checked ${{ steps.actionlint.outputs.total-files }} files"
            echo "actionlint cache used: ${{ steps.actionlint.outputs.cache-hit }}"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 1

      - name: Validate workflow_call inputs have descriptions
        if: steps.changed.outputs.any_changed == 'true'
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.all_changed_files }}
        run: |
          failed=0
          for file in $CHANGED_FILES; do
            if [[ "$file" == *.yaml || "$file" == *.yml ]]; then
              echo "Checking $file..."
              # Warn if workflow_call inputs are missing descriptions
              if grep -qE '^  workflow_call' "$file"; then
                if ! python3 - "$file" <<'EOF'
          import sys
          import yaml
          from pathlib import Path

          filepath = sys.argv[1]
          with open(filepath) as f:
              data = yaml.safe_load(f)

          on = data.get("on", data.get(True, {}))
          if not isinstance(on, dict):
              sys.exit(0)

          wc = on.get("workflow_call") or {}
          inputs = wc.get("inputs") or {}
          secrets = wc.get("secrets") or {}

          issues = []
          for name, cfg in inputs.items():
              cfg = cfg or {}
              if not cfg.get("description"):
                  issues.append(f"  input '{name}' is missing a description")
              if "type" not in cfg:
                  issues.append(f"  input '{name}' is missing a type")
          for name, cfg in secrets.items():
              cfg = cfg or {}
              if not cfg.get("description"):
                  issues.append(f"  secret '{name}' is missing a description")

          if issues:
              print(f"WARNING: {filepath}")
              for i in issues:
                  print(i)
              sys.exit(1)
          EOF
                then
                  failed=1
                fi
              fi
            fi
          done
          exit $failed
