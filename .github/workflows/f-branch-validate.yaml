---
name: Workflows/Actions Validation 

on:
  push:
    branches-ignore:
      - main

jobs:
  changes:
    name: Check for workflow or action file changes
    runs-on: arc-runners
    outputs:
      workflows: ${{ steps.changed.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for workflow file changes
        id: changed
        uses: tj-actions/changed-files@v46.0.5
        with:
          files: |
            .github/workflows/**/*.yaml
            .github/workflows/**/*.yml
            .github/actions/**/*.yaml
            .github/actions/**/*.yml

  validate:
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    name: Run Validation Checks
    uses: eingram-homelab/reusable-workflows/.github/workflows/_validate-workflow.yaml@validate-workflow-v0.1.1
