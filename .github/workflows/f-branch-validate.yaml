---
name: Feature Branch Validation

on:
  push:
    branches-ignore:
      - main

jobs:
  validate:
    name: Run Validation Checks
    uses: ./.github/workflows/_validate-workflow.yaml

  gate:
    needs: validate
    if: always()
    runs-on: arc-runners
    steps:
      - name: Publish advisory status
        run: |
          echo "Feature branch validation is advisory in this repository."
          echo "Validation result: ${{ needs.validate.result }}"
          exit 0
