---
name: Workflows/Actions Validation

on:
  pull_request:
    branches:
      - main

jobs:
  checks:
    name: Run Repository Checks
    uses: ./.github/workflows/_gha-workflow-checks.yaml
    with:
      ref: ${{ github.ref }}
      changed_files_patterns: |
        .github/workflows/**/*.yaml
        .github/workflows/**/*.yml
        .github/actions/**/*.yaml
        .github/actions/**/*.yml
    secrets:
      sonar_token: ${{ secrets.SONAR_TOKEN }}
