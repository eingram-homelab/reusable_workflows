---
name: Workflows/Actions Validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Check for workflow or action file changes
    runs-on: arc-runners
    outputs:
      workflows: ${{ steps.changed.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for workflow file changes
        id: changed
        uses: tj-actions/changed-files@v46.0.5
        with:
          files: |
            .github/workflows/**/*.yaml
            .github/workflows/**/*.yml
            .github/actions/**/*.yaml
            .github/actions/**/*.yml

  gha-checks:
    name: GitHub Actions Workflow Checks
    needs: changes
    if: needs.changes.outputs.workflows == 'true'
    uses: ./.github/workflows/_gha-workflow-checks.yaml
    secrets:
      sonar_token: ${{ secrets.SONAR_TOKEN }}