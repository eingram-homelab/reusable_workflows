---
name: Release Actions

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  changes:
    name: Check for action file changes
    runs-on: arc-runners
    outputs:
      changed: ${{ steps.changed.outputs.any_changed }}
      changed_files: ${{ steps.changed.outputs.all_changed_files }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for action changes
        id: changed
        uses: tj-actions/changed-files@v46.0.5
        with:
          files: |
            .github/actions/**

  validate:
    needs: changes
    if: needs.changes.outputs.changed == 'true'
    uses: eingram-homelab/reusable-workflows/.github/workflows/_validate-workflow.yaml@validate-workflow-v0.1.2
    name: Run Validation Checks
    with:
      changed_files_patterns: |
        .github/actions/**

  tag:
    needs: [changes, validate]
    if: needs.changes.outputs.changed == 'true' && needs.validate.result == 'success'
    runs-on: arc-runners
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag changed actions
        id: tag_actions
        uses: eingram-homelab/reusable-workflows/.github/actions/actions-semver-tag@actions-semver-tag-v0.0.1
        with:
          before_sha: ${{ github.event.before }}
          after_sha: ${{ github.sha }}
          changed_files: ${{ needs.changes.outputs.changed_files }}
          target_sha: ${{ github.sha }}

      - name: Show action release tagging summary
        run: |
          echo "Calculated bump: ${{ steps.tag_actions.outputs.bump }}"
          echo "Created tags: ${{ steps.tag_actions.outputs.created_tags || 'none' }}"
