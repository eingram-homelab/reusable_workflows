name: Lint
on:
  workflow_call:
    inputs:
      repository:
        description: 'Repository containing Terraform code to lint'
        type: string
        default: ''
      ref:
        description: 'Branch or ref to check out. Defaults to the PR head branch.'
        type: string
        default: ''

jobs:
  tflint:
    runs-on: arc-runners

    # strategy:
    #   matrix:
    #     os: [ubuntu-latest]

    steps:
    - uses: actions/checkout@v6.0.2
      name: Checkout source code
      with:
        fetch-depth: 0

    - name: Get changed dirs
      id: changed-dirs
      uses: tj-actions/changed-files@v46
      with:
        files: |
          **/*.tf
          **/*.tfvars
        dir_names: true
        dir_names_exclude_current_dir: false
  
    - uses: terraform-linters/setup-tflint@v6.2.2
      name: Setup TFLint
      with:
        tflint_version: v0.52.0
        cache: true

    - name: Show version
      run: tflint --version

    - name: Init TFLint
      run: tflint --init
      env:
        # https://github.com/terraform-linters/tflint/blob/master/docs/user-guide/plugins.md#avoiding-rate-limiting
        GITHUB_TOKEN: ${{ github.token }}

    - name: Run TFLint
      env:
        CHANGED_DIRS: ${{ steps.changed-dirs.outputs.all_changed_files }}
      run: |
        for dir in $CHANGED_DIRS; do
          tflint --chdir="$dir"
        done