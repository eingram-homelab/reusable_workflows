---
name: Terraform Validate New vSphere Template

on:
  workflow_call:
    inputs:
      TMPL_NAME:
        description: 'The vSphere template name to verify'
        required: true
        type: string
      terraform_version:
        description: 'Terraform version to use'
        required: false
        type: string
        default: '1.11.3'
      runner:
        description: 'Runner to use for the job'
        required: false
        type: string
        default: 'arc-runners'
    secrets:
      VAULT_TOKEN:
        description: 'Vault token with permissions to access secrets needed for validation'
        required: true
      GCP_STORAGE:
        description: 'Base64-encoded GCP service account key for accessing secrets needed for validation'
        required: true

jobs:
  validate_and_apply:
    name: Validate Packer Template on vSphere using Terraform
    runs-on: ${{ inputs.runner }}
    env:
      TF_VAR_vsphere_template: "${{ inputs.TMPL_NAME }}"
      TF_VAR_vm_name_list: '["gha-vm-test"]'
      TF_VAR_vm_folder_name: "Test"
      TF_VAR_is_windows_image: "${{ contains(inputs.TMPL_NAME, 'Win') && true || false }}"
      VAULT_ADDR: ${{ vars.VAULT_ADDR }}
      VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: eingram-homelab/terraform
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@main
        with:
          terraform_version: ${{ inputs.terraform_version }}

      - name: Create GCS credentials file
        run: |
          echo ${{ secrets.GCP_STORAGE }} | base64 --decode > /tmp/cred.json

      - name: Run terraform init
        run: |
          cd projects/cicd/vsphere/tmpl-verify
          terraform init

      - name: Run terraform apply
        run: |
          cd projects/cicd/vsphere/tmpl-verify
          terraform apply --auto-approve

      - name: Test VM network connectivity
        id: ping
        run: |
          sudo apt-get update && sudo apt-get install -y iputils-ping
          cd projects/cicd/vsphere/tmpl-verify
          ping -c 4 "$(terraform output -json default_ip_address | jq -r '.[0]')"
          if [ $? -eq 0 ]; then
            echo "VM is reachable"
          else
            echo "VM is not reachable"
            exit 1
          fi

      - name: Destroy Test VM
        if: steps.ping.outcome == 'success'
        run: |
          cd projects/cicd/vsphere/tmpl-verify
          terraform destroy --auto-approve
